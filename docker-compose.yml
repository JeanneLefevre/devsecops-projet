services:
  app:
    build: .
    ports:
      - "${PORT}:3000"
    volumes:
      - .:/app
    env_file:
      - .env.dev
    depends_on:
      - db
    command: npm run dev

  db:
    image: postgres:15-alpine
    restart: always
    env_file:
      - .env.dev
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
